# Day 13: docker-compose 本地部署 (1 container, healthcheck 验证)
# 中文:本地起 1 个 Agent Bootcamp container, 暴露 8080, 自动 healthcheck
# English: local single-container deploy with healthcheck

version: "3.9"

services:
  agent-bootcamp:
    build: .
    image: agent-bootcamp:latest
    container_name: agent-bootcamp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # LLM Provider 配置 — 替换成你的 key (或从 .env 文件 mount)
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:-sk-cp-dummy}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.minimaxi.com/v1}"
      LLM_MODEL: "${LLM_MODEL:-minimax-m3}"
      # Day 12: safe mode 默认开
      JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # 限制资源 (跟 K8s resources.limits 同款)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # 可选: Prometheus 抓 /metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: agent-bootcamp-prometheus
    profiles: ["monitoring"]  # 默认不起, --profile monitoring 起
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      agent-bootcamp:
        condition: service_healthy