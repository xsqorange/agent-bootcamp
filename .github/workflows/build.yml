name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: ./mvnw -B verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agent-bootcamp-jar
          path: target/agent-bootcamp.jar
