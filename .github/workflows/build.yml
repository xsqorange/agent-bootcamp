name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests (fast, no LLM)
        run: ./mvnw -B test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agent-bootcamp-jar
          path: target/agent-bootcamp.jar
