name: Eval (E2E)

on:
  # 手动触发:Actions tab → Eval (E2E) → Run workflow
  workflow_dispatch:
  # 每周日 UTC 02:00 跑一次,捕获 MiniMax 侧 API 回归
  schedule:
    - cron: '0 2 * * 0'

jobs:
  eval-e2e:
    name: E2E Eval (requires MINIMAX_API_KEY secret)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run mvn verify (E2E + EvalCase)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          # MiniMax 端点(MiniMax 公司,base URL 来自 LlmConfig.sk-cp- 前缀推断,这里显式 override 更稳)
          LLM_BASE_URL: https://api.minimaxi.com/v1
          LLM_MODEL: minimax-m3
        run: ./mvnw -B verify

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: evals/reports/

      - name: Summarize pass/fail
        if: always()
        run: |
          echo "## Eval summary" >> $GITHUB_STEP_SUMMARY
          ls -la evals/reports/ 2>/dev/null | tail -n +2 | awk '{print "- " $9 " (" $5 " bytes)"}' >> $GITHUB_STEP_SUMMARY
